version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: appvistoria-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: appvistoria
      POSTGRES_USER: appvistoria
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appvistoria"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: appvistoria-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: appvistoria-api:latest
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: appvistoria-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://appvistoria:${DB_PASSWORD}@db:5432/appvistoria
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      HETZNER_S3_ENDPOINT: ${HETZNER_S3_ENDPOINT}
      HETZNER_S3_ACCESS_KEY: ${HETZNER_S3_ACCESS_KEY}
      HETZNER_S3_SECRET_KEY: ${HETZNER_S3_SECRET_KEY}
      HETZNER_S3_BUCKET: ${HETZNER_S3_BUCKET}
      FRONTEND_URL: https://admin.appvistoria.com.br
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.appvistoria-api.rule=Host(`api.appvistoria.com.br`)"
      - "traefik.http.routers.appvistoria-api.entrypoints=https"
      - "traefik.http.routers.appvistoria-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.appvistoria-api.loadbalancer.server.port=3000"
      # Redirect HTTP -> HTTPS
      - "traefik.http.routers.appvistoria-api-http.rule=Host(`api.appvistoria.com.br`)"
      - "traefik.http.routers.appvistoria-api-http.entrypoints=http"
      - "traefik.http.routers.appvistoria-api-http.middlewares=redirect-to-https"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    image: appvistoria-web:latest
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://api.appvistoria.com.br
        VITE_WS_URL: wss://api.appvistoria.com.br
    container_name: appvistoria-web
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      # Admin panel
      - "traefik.http.routers.appvistoria-admin.rule=Host(`admin.appvistoria.com.br`)"
      - "traefik.http.routers.appvistoria-admin.entrypoints=https"
      - "traefik.http.routers.appvistoria-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.appvistoria-web.loadbalancer.server.port=80"
      # Sindico portal
      - "traefik.http.routers.appvistoria-sindico.rule=Host(`sindico.appvistoria.com.br`)"
      - "traefik.http.routers.appvistoria-sindico.entrypoints=https"
      - "traefik.http.routers.appvistoria-sindico.tls.certresolver=letsencrypt"
      # HTTP redirects
      - "traefik.http.routers.appvistoria-web-http.rule=Host(`admin.appvistoria.com.br`) || Host(`sindico.appvistoria.com.br`)"
      - "traefik.http.routers.appvistoria-web-http.entrypoints=http"
      - "traefik.http.routers.appvistoria-web-http.middlewares=redirect-to-https"

  pwa:
    image: appvistoria-pwa:latest
    build:
      context: ./pwa
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://api.appvistoria.com.br
        VITE_WS_URL: wss://api.appvistoria.com.br
    container_name: appvistoria-pwa
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.appvistoria-pwa.rule=Host(`app.appvistoria.com.br`)"
      - "traefik.http.routers.appvistoria-pwa.entrypoints=https"
      - "traefik.http.routers.appvistoria-pwa.tls.certresolver=letsencrypt"
      - "traefik.http.services.appvistoria-pwa.loadbalancer.server.port=80"
      - "traefik.http.routers.appvistoria-pwa-http.rule=Host(`app.appvistoria.com.br`)"
      - "traefik.http.routers.appvistoria-pwa-http.entrypoints=http"
      - "traefik.http.routers.appvistoria-pwa-http.middlewares=redirect-to-https"

  site:
    image: nginx:alpine
    container_name: appvistoria-site
    restart: unless-stopped
    volumes:
      - ./site:/usr/share/nginx/html:ro
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.appvistoria-site.rule=Host(`appvistoria.com.br`) || Host(`www.appvistoria.com.br`)"
      - "traefik.http.routers.appvistoria-site.entrypoints=https"
      - "traefik.http.routers.appvistoria-site.tls.certresolver=letsencrypt"
      - "traefik.http.services.appvistoria-site.loadbalancer.server.port=80"
      - "traefik.http.routers.appvistoria-site-http.rule=Host(`appvistoria.com.br`) || Host(`www.appvistoria.com.br`)"
      - "traefik.http.routers.appvistoria-site-http.entrypoints=http"
      - "traefik.http.routers.appvistoria-site-http.middlewares=redirect-to-https"

volumes:
  db_data:
  redis_data:

networks:
  coolify:
    external: true
