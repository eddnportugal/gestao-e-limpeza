    <noscript>Você precisa habilitar JavaScript para usar o Gestão e Limpeza.</noscript>
    <div id="root"></div>
    <script>
      // Force-clear stale Service Workers and caches from previous builds
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) {
            if (r.active && r.active.scriptURL && !r.active.scriptURL.includes('workbox')) {
              r.unregister();
            }
          });
        });
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) {
              if (name.startsWith('gestao')) caches.delete(name);
            });
          });
        }
      }
    </script>
