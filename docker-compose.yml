services:
  # ── API Backend ──
  gestao-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gestao-api
    restart: unless-stopped
    environment:
      PORT: "3001"
      DATABASE_URL: ${DATABASE_URL:-}
      DB_SSL: ${DB_SSL:-false}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://gestaoelimpeza.com.br}
      FRONTEND_URL: ${FRONTEND_URL:-https://gestaoelimpeza.com.br}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Gestão e Limpeza}
    volumes:
      - uploads:/app/uploads
    networks:
      - coolify
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend Nginx ──
  gestao-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestao-app
    restart: unless-stopped
    depends_on:
      - gestao-api
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      # HTTPS
      - "traefik.http.routers.gestao-https.rule=Host(`gestaoelimpeza.com.br`) || Host(`www.gestaoelimpeza.com.br`)"
      - "traefik.http.routers.gestao-https.entrypoints=https"
      - "traefik.http.routers.gestao-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.gestao.loadbalancer.server.port=80"
      - "traefik.http.routers.gestao-https.priority=1"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.gestao-http.rule=Host(`gestaoelimpeza.com.br`) || Host(`www.gestaoelimpeza.com.br`)"
      - "traefik.http.routers.gestao-http.entrypoints=http"
      - "traefik.http.routers.gestao-http.middlewares=gestao-redirect-https"
      - "traefik.http.middlewares.gestao-redirect-https.redirectscheme.scheme=https"
      # www → raiz redirect
      - "traefik.http.routers.gestao-www.rule=Host(`www.gestaoelimpeza.com.br`)"
      - "traefik.http.routers.gestao-www.entrypoints=https"
      - "traefik.http.routers.gestao-www.tls=true"
      - "traefik.http.routers.gestao-www.middlewares=gestao-redirect-www"
      - "traefik.http.middlewares.gestao-redirect-www.redirectregex.regex=^https://www\\.gestaoelimpeza\\.com\\.br/(.*)"
      - "traefik.http.middlewares.gestao-redirect-www.redirectregex.replacement=https://gestaoelimpeza.com.br/$${1}"
      - "traefik.http.middlewares.gestao-redirect-www.redirectregex.permanent=true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ── Backup automático ──
  gestao-backup:
    image: postgres:16-alpine
    container_name: gestao-backup
    restart: unless-stopped
    environment:
      PGDATABASE: ${BACKUP_DB_NAME:-gestao}
      PGUSER: ${BACKUP_DB_USER:-gestao}
      PGPASSWORD: ${BACKUP_DB_PASSWORD:-gestao_secret}
      PGHOST: ${BACKUP_DB_HOST:-postgres}
      PGPORT: ${BACKUP_DB_PORT:-5432}
    volumes:
      - backups:/var/backups/gestao
    networks:
      - coolify
    entrypoint: >
      sh -c "while true; do
        TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
        echo \"[$$(date)] Iniciando backup...\";
        pg_dump --no-owner --no-privileges | gzip > /var/backups/gestao/gestao_$$TIMESTAMP.sql.gz;
        find /var/backups/gestao -name 'gestao_*.sql.gz' -mtime +30 -delete;
        echo \"[$$(date)] Backup concluído.\";
        sleep 86400;
      done"

volumes:
  uploads:
  backups:

networks:
  coolify:
    external: true
